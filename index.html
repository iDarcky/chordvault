<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>Setlists MD</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Update theme color based on preference
      const updateThemeColor = () => {
        const theme = localStorage.getItem('chordvault:settings')
          ? JSON.parse(localStorage.getItem('chordvault:settings')).theme
          : 'light';
        const meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
      };
      updateThemeColor();
      window.addEventListener('storage', updateThemeColor);
    </script>
  </body>
</html>
